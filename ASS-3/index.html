<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Scoreboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1><span>STUDENT</span> SCOREBOARD</h1>

  <!-- Add Student -->
  <div class="form">
    <input type="text" id="name" placeholder="Student name">
    <input type="number" id="score" placeholder="Score (0-100)">
    <button onclick="addStudent()">+ ADD</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div>Total: <span id="total">0</span></div>
    <div>Passed: <span id="passed">0</span></div>
    <div>Avg Score: <span id="avg">0</span></div>
  </div>

  <!-- Table -->
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Score</th>
        <th>Status</th>
        <th>Update</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="script.js"></script>
</body>
</html>
